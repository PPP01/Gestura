name: 功能建议
description: 为 Gestura 提出新功能或改进建议
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述你想要的手势相关功能。
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 为什么这个功能有用？它能解决什么问题？
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何设计范例、截图或来自其他工具的示例。
    validations:
      required: false
