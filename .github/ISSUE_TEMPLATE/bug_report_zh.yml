name: Bug 反馈
description: 报告 FlowMouse 的 Bug 或异常行为
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **感谢你花时间反馈 Bug！**
        为帮助我们定位并修复问题，请填写以下所有必填项，未完整填写的 Issue 可能会被关闭。

  - type: input
    id: extension-version
    attributes:
      label: 扩展版本
      description: 在 FlowMouse 设置页左下角可以找到版本号。
      placeholder: "例如 1.3"
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: 浏览器及版本
      description: 你使用的浏览器名称和版本号。
      placeholder: "例如 Chrome 146.0.1234.10"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: 操作系统及版本
      placeholder: "例如 Windows 11 23H2 (26000.1234)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述 Bug 是什么。
      placeholder: 描述发生了什么以及你期望发生什么。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 打开 '...'
        2. 执行手势 '...'
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、录屏、错误信息或其他相关内容。
    validations:
      required: false
