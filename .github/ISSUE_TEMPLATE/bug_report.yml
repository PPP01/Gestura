name: Bug Report
description: Report a bug or unexpected behavior in Gestura
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Thank you for taking the time to report a bug!**
        To help us identify and fix the issue, please fill out all required fields below. Incomplete reports may be closed.

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Found at the bottom-left corner of the Gestura options page.
      placeholder: "e.g. 1.3"
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser & Version
      description: Your browser name and version number.
      placeholder: "e.g. Chrome 146.0.1234.10"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: Operating System & Version
      placeholder: "e.g. Windows 11 23H2 (26000.1234)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Perform gesture '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, error messages, or any other relevant information.
    validations:
      required: false
